[database]
url = "sqlite:poly-lp.db"
max_connections = 5

[telegram]
# Bot tokens set via TELEGRAM_BOT_TOKENS env var
rate_limit_per_user = 20  # messages per minute

[monitor]
subscription_refresh_interval_secs = 60
ws_ping_interval_secs = 10
reconnect_base_delay_secs = 1
reconnect_max_delay_secs = 60

[alert]
cache_refresh_interval_secs = 30
default_cooldown_minutes = 60
price_flush_interval_secs = 30

[scheduler]
daily_summary_cron = "0 0 9 * * *"  # 9:00 UTC daily

[admin]
port = 36363
# Password set via ADMIN_PASSWORD env var

[guard]
enabled = false
bind_addr = "127.0.0.1"
port = 37373
heartbeat_interval_secs = 5
heartbeat_timeout_secs = 15
check_interval_secs = 1

[lp.trading]
condition_id = "0x306d10d4a4d51b41910dbc779ca00908bd917c131541c5c42bbbc736258d2d56"
clob_base_url = "https://clob.polymarket.com"
gamma_base_url = "https://gamma-api.polymarket.com"
data_api_base_url = "https://data-api.polymarket.com"
chain_id = 137

[lp.inventory]
min_usdc_balance = 50.0
min_token_balance = 10.0
auto_split_on_startup = false
startup_split_amount = 0.0

[lp.strategy]
quote_mode = "inside"
quote_size = 25
min_spread = 0.01
min_depth = 25.0
quote_offset_ticks = 2
max_quote_age_secs = 30
reward_refresh_interval_secs = 30
reward_stale_after_secs = 90
reward_fetch_retries = 3
reward_fetch_backoff_ms = 250
min_inside_ticks = 1
min_inside_depth_multiple = 1.5
default_external_signal = true

[lp.risk]
max_position = 100.0
flat_position_tolerance = 1.0
auto_flatten_after_fill = true
flatten_use_fok = false
stale_feed_after_secs = 15

[lp.approvals]
require_on_startup = true
auto_approve_on_startup = true

[lp.reporting]
operator_bot_id = ""
operator_chat_ids = []
summary_interval_secs = 300

[lp.control]
bind_addr = "127.0.0.1"
heartbeat_interval_secs = 5
reconciliation_interval_secs = 10

[lp.logging]
snapshot_interval_secs = 60
directory = "logs"
file_prefix = "poly-lp"
max_files = 14
json = true

